<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hand-Controlled Voxel Editor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="overlay">
        <h1>Voxel Gesture Lab</h1>
        <div class="controls">
          <label>
            Voxel Color
            <input type="color" id="colorPicker" value="#00d4ff" />
          </label>
          <button id="toggleCamera">Show Camera</button>
          <button id="saveModel">Save JSON</button>
          <label class="file-input">
            Load JSON
            <input id="loadModel" type="file" accept="application/json" />
          </label>
          <button id="undoBtn">Undo</button>
          <button id="redoBtn">Redo</button>
        </div>
        <div class="status-row">
          <span id="fps">FPS: --</span>
          <span id="trackingStatus">Tracking: Initializing...</span>
          <span id="voxelCount">Voxels: 0</span>
          <span class="hint">Pinch=Add | Open Palm=Delete</span>
        </div>
      </div>

      <video id="cameraView" autoplay playsinline muted></video>
      <canvas id="threeCanvas"></canvas>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
